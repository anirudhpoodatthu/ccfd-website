<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CCFD</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

  {% if error %}
  <div class="error-alert">{{ error }}</div>
  {% endif %}

  <div class="container" id="authContainer">
    <div class="curved-shape"></div>
    <div class="curved-shape2"></div>

    <!-- Login Form -->
    <div class="form-box Login">
      <h2 class="animation" style="--D:0;--S:21">Login</h2>
      <form action="/login" method="post">
        <div class="input-box animation" style="--D:1;--S:22">
          <input type="text" name="username" required>
          <label>Username</label>
          <box-icon type="solid" name="user"></box-icon>
        </div>
        <div class="input-box animation" style="--D:2;--S:23">
          <input type="password" name="password" required>
          <label>Password</label>
          <box-icon name="lock-alt" type="solid"></box-icon>
        </div>
        <div class="input-box animation" style="--D:3;--S:24">
          <button class="btn" type="submit">Login</button>
        </div>
        <div class="regi-link animation" style="--D:4;--S:25">
          <p>Don't have an account? <a href="#" class="SignUpLink">Sign Up</a></p>
        </div>
      </form>
    </div>

    <div class="info-content Login">
      <h2 class="animation" style="--D:0;--S:20">WELCOME BACK!</h2>
      <p class="animation" style="--D:1;--S:21">Happy to have you again. Use <strong>demo / demo123</strong> or Quick Demo Login.</p>
    </div>

    <!-- Register Form -->
    <div class="form-box Register">
      <h2 class="animation" style="--li:17;--S:0">Register</h2>
      <form action="/register" method="post">
        <div class="input-box animation" style="--li:18;--S:1">
          <input type="text" name="username" required>
          <label>Username</label>
          <box-icon type="solid" name="user"></box-icon>
        </div>
        <div class="input-box animation" style="--li:19;--S:2">
          <input type="email" name="email" required>
          <label>Email</label>
          <box-icon name="envelope" type="solid"></box-icon>
        </div>
        <div class="input-box animation" style="--li:19;--S:3">
          <input type="password" name="password" required>
          <label>Password</label>
          <box-icon name="lock-alt" type="solid"></box-icon>
        </div>
        <div class="input-box animation" style="--li:20;--S:4">
          <button class="btn" type="submit">Register</button>
        </div>
        <div class="regi-link animation" style="--li:21;--S:5">
          <p>Already have an account? <a href="#" class="SignInLink">Sign In</a></p>
        </div>
      </form>
    </div>

    <div class="info-content Register">
      <h2 class="animation" style="--li:17;--S:0">WELCOME!</h2>
      <p class="animation" style="--li:18;--S:1">Create an account to access the fraud detection model.</p>
    </div>
  </div>

  <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
  <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
